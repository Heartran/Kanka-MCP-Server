# This workflow will verify if the manifest.json is valid
# It will use official mcpb npm package

name: MCPB Validation (Claude Extension)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
      - name: Install mcpb
        run: npm install -g @anthropic-ai/mcpb
      - name: Validate manifest.json
        run: mcpb validate manifest.json

